# Canonical WordPress stack — paste into the Dokploy "Docker Compose" editor.
# One copy per site; it is IDENTICAL for every site. What changes per site is the
# ENVIRONMENT block, which you set in Dokploy → Environment (generate it with
# scripts/new-wordpress-site.sh). Enable "Isolated Deployments" on the service so
# each site gets its own network. Wire the domain in Dokploy's Domain tab:
#   service = wordpress, container port = 80, HTTPS + Let's Encrypt.
services:
  wordpress:
    image: wordpress:7-php8.5-apache
    restart: unless-stopped
    depends_on:
      - db
    environment:
      - WORDPRESS_DB_HOST=db
      - WORDPRESS_DB_USER=$SERVICE_USER_WORDPRESS
      - WORDPRESS_DB_PASSWORD=$SERVICE_PASSWORD_WORDPRESS
      - WORDPRESS_DB_NAME=wordpress
      # Trust Traefik's SSL termination + pin the site URLs to https.
      # NOTE: PHP '$' is escaped as '$$' so Dokploy/Compose does not interpolate it.
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_HOME','https://${SITE_DOMAIN}');
        define('WP_SITEURL','https://${SITE_DOMAIN}');
        if (isset($$_SERVER['HTTP_X_FORWARDED_PROTO']) && $$_SERVER['HTTP_X_FORWARDED_PROTO'] === 'https') {
          $$_SERVER['HTTPS'] = 'on';
        }
    volumes:
      - wp_content:/var/www/html/wp-content
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1"]
      interval: 30s
      timeout: 10s
      retries: 5

  db:
    image: mariadb:12
    restart: unless-stopped
    # MariaDB tuning automated here — no manual my.cnf. Tune down if cramming sites.
    command: >-
      --innodb-buffer-pool-size=192M
      --max-connections=50
      --innodb-log-file-size=64M
    environment:
      - MYSQL_DATABASE=wordpress
      - MYSQL_ROOT_PASSWORD=$SERVICE_PASSWORD_ROOT
      - MYSQL_USER=$SERVICE_USER_WORDPRESS
      - MYSQL_PASSWORD=$SERVICE_PASSWORD_WORDPRESS
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 30s
      timeout: 20s
      retries: 5

volumes:
  wp_content:
  db_data:
